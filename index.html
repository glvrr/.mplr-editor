<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MPLR Editor</title>
<style>
:root {
  --fg: #f2f2f2;
  --muted: #8c8c8c;
  --line: #3a3a3a;
  --line-bright: #5a5a5a;
  --bg: #0a0a0a;
  --bg2: #111;
  --accent: #f2f2f2;
  --active-bg: #fff;
  --active-fg: #000;
  --key-h: 72px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--fg);
  font-family: "JetBrains Mono", "Consolas", monospace;
  height: 100vh;
  overflow: hidden;
  font-size: 13px;
}
@media (max-width: 768px) {
  body { height: auto; overflow: auto; overflow-x: hidden; }
}

/* ── FRAME CORNERS ── */
.frame {
  border: 1px solid var(--fg);
  position: relative;
}
.frame::before, .frame::after {
  content: "";
  position: absolute;
  background: var(--bg);
  z-index: 1;
}
.frame::before { top: -1px; left: 10px; width: 16px; height: 3px; }
.frame::after  { bottom: -1px; right: 10px; width: 16px; height: 3px; }

/* ── HEADER ── */
.header {
  margin: 10px 10px 0;
  padding: 14px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  height: 80px;
}
.logo { font-size: 30px; font-weight: 700; letter-spacing: .1em; }
.logo span { color: var(--muted); font-size: 13px; font-weight: 400; margin-left: 14px; letter-spacing: 0; }
.stats { display: flex; gap: 36px; }
.stat .slabel { color: var(--muted); font-size: 11px; margin-bottom: 2px; }
.stat .svalue { font-size: 28px; font-weight: bold; line-height: 1; }

/* ── LAYOUT ── */
.main {
  display: grid;
  grid-template-columns: 260px 1fr 340px;
  gap: 10px;
  padding: 10px;
  height: calc(100vh - 90px);
  transition: grid-template-columns .18s ease;
}
.main.left-collapsed {
  grid-template-columns: 56px 1fr 340px;
}
.panel { overflow: auto; padding: 14px; position: relative; }

/* ── LEFT PANEL COLLAPSE ── */
#left-panel { transition: padding .18s ease; padding-right: 28px !important; }

.panel-collapse-rail {
  position: absolute;
  top: 0;
  right: 0;
  bottom: 0;
  width: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  background: transparent;
  border-left: 1px solid var(--line);
  transition: background .15s, border-color .15s;
  z-index: 5;
}
.panel-collapse-rail:hover {
  background: rgba(255,255,255,.04);
  border-left-color: var(--fg);
}
.panel-collapse-rail .collapse-arrow {
  font-size: 9px;
  color: var(--muted);
  transition: color .15s, transform .18s ease;
}
.panel-collapse-rail:hover .collapse-arrow { color: var(--fg); }

.main.left-collapsed #left-panel {
  padding: 14px 0 14px 0 !important;
  overflow: hidden;
}
.main.left-collapsed #left-panel .panel-content {
  display: none;
}
.main.left-collapsed .panel-collapse-rail {
  width: 18px;
}
.main.left-collapsed .panel-collapse-rail .collapse-arrow {
  transform: rotate(180deg);
}
.panel-collapsed-rail {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  padding-top: 4px;
  width: 100%;
  padding-right: 18px;
}
.main.left-collapsed .panel-collapsed-rail { display: flex; }
.rail-icon-btn {
  width: 26px;
  height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  border: 1px solid var(--line-bright);
  color: var(--fg);
  cursor: pointer;
  font-size: 13px;
  padding: 0;
}
.rail-icon-btn:hover { border-color: var(--fg); }
.rail-icon-btn.primary { border-color: var(--fg); }
.rail-icon-btn.primary:hover { background: var(--fg); color: var(--bg); }
.rail-icon-btn:disabled { opacity: .3; cursor: not-allowed; }
.rail-icon-btn:disabled:hover { border-color: var(--line-bright); }
.rail-label {
  font-size: 9px;
  color: var(--muted);
  letter-spacing: .1em;
  writing-mode: vertical-rl;
  text-orientation: mixed;
  margin-top: 6px;
}

/* ── COLLAPSIBLE SECTION ── */
.section { border: 1px solid var(--line); margin-bottom: 10px; }
.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 12px;
  border-bottom: 1px solid var(--line);
  font-weight: bold;
  font-size: 11px;
  letter-spacing: .08em;
  cursor: pointer;
  user-select: none;
  color: var(--muted);
}
.section-header:hover { color: var(--fg); }
.section-header .toggle-icon {
  transition: transform .2s;
  font-style: normal;
  font-size: 10px;
}
.section.collapsed .toggle-icon { transform: rotate(180deg); }
.section.collapsed .section-body { display: none; }
.section-body { padding: 12px; }

/* ── INPUTS ── */
.flabel { color: var(--muted); font-size: 11px; margin: 10px 0 4px; }
.flabel:first-child { margin-top: 0; }
input, select, textarea {
  width: 100%;
  background: #050505;
  color: var(--fg);
  border: 1px solid var(--line-bright);
  padding: 8px 10px;
  font-family: inherit;
  font-size: 12px;
  outline: none;
  transition: border-color .15s;
}
input:focus, select:focus, textarea:focus { border-color: var(--fg); }
select option { background: #111; }

/* ── BUTTONS ── */
button {
  background: var(--bg);
  color: var(--fg);
  border: 1px solid var(--line-bright);
  padding: 8px 12px;
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
  transition: background .12s, color .12s, border-color .12s;
}
button:hover { border-color: var(--fg); }
button.active, button.tab.active {
  background: var(--active-bg);
  color: var(--active-fg);
  border-color: var(--active-bg);
  font-weight: bold;
}
button.danger { border-color: #c0392b; color: #c0392b; }
button.danger:hover { background: #c0392b; color: #fff; }
button.primary { border-color: var(--fg); }
button.primary:hover { background: var(--fg); color: var(--bg); }

/* ── TOOLBAR ── */
.toolbar-group {
  margin-bottom: 16px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--line);
}
.toolbar-row {
  display: flex;
  gap: 6px;
}
.toolbar-row + .toolbar-row { margin-top: 8px; }
.toolbar-row-split {
  padding-top: 8px;
  border-top: 1px dashed var(--line);
}

.tbtn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 10px 6px;
  cursor: pointer;
  background: var(--bg);
  color: var(--fg);
  border: 1px solid var(--line-bright);
  font-family: inherit;
  transition: background .12s, color .12s, border-color .12s;
}
.tbtn:hover { border-color: var(--fg); }
.tbtn.primary { border-color: var(--fg); }
.tbtn.primary:hover { background: var(--fg); color: var(--bg); }
.tbtn.primary .tbtn-icon, .tbtn.primary .tbtn-label { color: inherit; }

.tbtn-icon {
  font-size: 16px;
  line-height: 1;
}
.tbtn-label {
  font-size: 9px;
  letter-spacing: .07em;
  font-weight: bold;
  white-space: nowrap;
}

.tbtn:disabled {
  opacity: .3;
  cursor: not-allowed;
  border-color: var(--line);
}
.tbtn:disabled:hover { border-color: var(--line); }

/* DOWNLOAD gets more visual weight as the primary action */
.toolbar-row .tbtn.primary { flex: 1.4; }

/* ── LAYER LIST ── */
.layer-item {
  display: flex;
  gap: 6px;
  margin-bottom: 6px;
  align-items: center;
}
.layer-item button { flex: 1; text-align: left; }
.layer-item .del-btn { flex: 0 0 auto; padding: 8px 10px; }

/* ── LAYER TABS ── */
.layer-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.layer-tabs button { font-size: 11px; letter-spacing: .06em; }

/* ── KEY GRID ── */
.grid-wrap {
  border: 1px solid var(--line);
  padding: 14px;
  background-image:
    linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
  background-size: 20px 20px;
}
.matrix { display: grid; gap: 6px; grid-auto-rows: var(--key-h); }
.matrix > .key-btn { min-width: 0; }
.key-btn {
  height: var(--key-h);
  width: 100%;
  min-width: 0;
  max-width: 100%;
  overflow: hidden;
  text-align: left;
  padding: 8px;
  font-size: 11px;
  line-height: 1.3;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  border-color: var(--line-bright);
  transition: background .1s, border-color .1s;
  user-select: none;
  -webkit-user-drag: element;
}
.key-btn * { pointer-events: none; }
.key-btn:hover { border-color: var(--fg); }
.key-btn.selected { border-color: var(--fg); background: #1a1a1a; }
.key-btn.drag-over { border-color: var(--fg); background: #222; outline: 2px dashed var(--fg); outline-offset: -3px; }
.key-btn[draggable="true"] { cursor: grab; }
.key-btn.dragging { opacity: .35; }
.key-btn.duplicate { border-color: #d4a017; }
.key-btn.duplicate::after {
  content: "⚠";
  position: absolute;
  top: 4px; right: 4px;
  color: #d4a017;
  font-size: 11px;
}
.key-btn { position: relative; }
.key-btn.empty-key { opacity: .4; }
.key-idx { color: var(--muted); font-size: 10px; flex-shrink: 0; }
.key-name {
  font-weight: bold;
  font-size: 12px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
  min-width: 0;
}
.key-method {
  color: var(--muted);
  font-size: 10px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: block;
  max-width: 100%;
  min-width: 0;
}
.key-bottom-row { display: flex; justify-content: space-between; align-items: baseline; gap: 4px; min-width: 0; width: 100%; overflow: hidden; }
.key-bottom-row .key-idx { white-space: nowrap; flex-shrink: 0; }
.key-bottom-row .key-method { min-width: 0; flex: 1 1 auto; text-align: right; overflow: hidden; }

/* ── ENCODER ROW ── */
.encoder-section { margin-top: 12px; }
.encoder-label {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: .08em;
  margin-bottom: 8px;
  font-weight: bold;
}
.encoder-row { display: flex; gap: 6px; }
.encoder-btn {
  flex: 1;
  text-align: left;
  padding: 8px;
  font-size: 11px;
  line-height: 1.3;
  min-height: 52px;
  min-width: 0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  border-color: var(--line-bright);
  user-select: none;
  -webkit-user-drag: element;
}
.encoder-btn * { pointer-events: none; }
.encoder-btn.selected { border-color: var(--fg); background: #1a1a1a; }
.encoder-btn.drag-over { border-color: var(--fg); background: #222; outline: 2px dashed var(--fg); outline-offset: -3px; }
.encoder-btn[draggable="true"] { cursor: grab; }
.encoder-btn.dragging { opacity: .35; }
.encoder-btn.duplicate { border-color: #d4a017; }
.encoder-btn.duplicate::after {
  content: "⚠";
  position: absolute;
  top: 4px; right: 4px;
  color: #d4a017;
  font-size: 11px;
}
.encoder-btn { position: relative; }
.enc-label { color: var(--muted); font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.enc-name {
  font-weight: bold;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
}

/* ── LAYER TOPBAR ── */
.layer-topbar {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 12px;
}
.layer-tabs { margin-bottom: 0; }
.layer-name-edit-wrap {
  display: flex;
  gap: 6px;
  align-items: center;
  padding: 6px 8px;
  border: 1px solid var(--line-bright);
  background: #0d0d0d;
}
.layer-name-edit-wrap::before {
  content: "LAYER NAME";
  font-size: 10px;
  color: var(--muted);
  letter-spacing: .08em;
  white-space: nowrap;
}
.layer-name-input {
  flex: 1;
  border: none;
  border-bottom: 1px solid var(--line-bright);
  background: transparent;
  font-size: 13px;
  font-weight: bold;
  letter-spacing: .04em;
  padding: 4px 6px;
}
.layer-name-input:focus { border-bottom-color: var(--fg); outline: none; }
.layer-name-ok {
  padding: 4px 10px;
  font-size: 13px;
  border-color: var(--fg);
}

/* ── DROP OVERLAY ── */
.drop-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.85);
  z-index: 500;
  display: none;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}
.drop-overlay.active { display: flex; }
.drop-overlay-inner {
  border: 2px dashed var(--fg);
  padding: 50px 70px;
  text-align: center;
}
.drop-icon { font-size: 48px; margin-bottom: 14px; }
.drop-text { font-size: 16px; letter-spacing: .06em; font-weight: bold; }

/* ── ACTION EDITOR ── */
.mod-toggle-row { display: flex; gap: 6px; margin-bottom: 4px; }
.mod-toggle {
  flex: 1;
  font-size: 11px;
  letter-spacing: .04em;
  padding: 8px 4px;
  border-color: var(--line-bright);
}
.mod-toggle.active {
  background: var(--active-bg);
  color: var(--active-fg);
  border-color: var(--active-bg);
  font-weight: bold;
}
.key-combo-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
.key-combo-item {
  display: flex;
  gap: 4px;
  align-items: center;
}
.key-combo-item input { flex: 1; text-transform: uppercase; }
.key-combo-item button { flex: 0 0 auto; padding: 8px 10px; }
.add-key-btn { width: 100%; }

/* ── STATUS BAR ── */
.statusbar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--fg);
  color: var(--bg);
  font-size: 11px;
  padding: 4px 14px;
  display: flex;
  gap: 20px;
  z-index: 100;
}
.statusbar span { opacity: .6; }
.statusbar .status-msg { font-weight: bold; opacity: 1; }

/* ══════════════════════════════════════════
   MOBILE LAYOUT  (≤ 768px)
══════════════════════════════════════════ */
@media (max-width: 768px) {

  /* Desktop-only collapse mechanism must not affect mobile layout at all */
  .main.left-collapsed {
    grid-template-columns: 1fr !important;
  }
  .main.left-collapsed #left-panel {
    padding: 12px !important;
    overflow: visible !important;
  }
  .main.left-collapsed #left-panel .panel-content {
    display: block !important;
  }
  .panel-collapse-rail { display: none !important; }
  .panel-collapsed-rail { display: none !important; }

  /* Header: stack logo + stats */
  .header {
    height: auto;
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 14px;
    margin: 8px 8px 0;
  }
  .logo { font-size: 22px; }
  .logo span { display: none; }
  .stats { gap: 20px; }
  .stat .svalue { font-size: 20px; }

  /* Main: single column, no fixed height */
  .main {
    grid-template-columns: 1fr;
    height: auto;
    padding: 8px;
    gap: 0;
    padding-bottom: 60px; /* space for bottom nav */
  }

  /* Each panel: hide by default, show active */
  .panel {
    display: none;
    overflow: visible;
    padding: 12px;
  }
  .panel.mobile-active { display: block; }

  /* Keys smaller on mobile */
  :root { --key-h: 58px; }
  .key-name { font-size: 11px; }

  /* Bottom nav bar */
  .mobile-nav {
    display: flex;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--bg);
    border-top: 1px solid var(--fg);
    z-index: 200;
    height: 52px;
  }
  .mobile-nav button {
    flex: 1;
    border: none;
    border-right: 1px solid var(--line);
    font-size: 11px;
    letter-spacing: .06em;
    padding: 0;
    height: 100%;
    border-radius: 0;
  }
  .mobile-nav button:last-child { border-right: none; }
  .mobile-nav button.active { background: var(--fg); color: var(--bg); font-weight: bold; }

  /* Status bar moves up above nav */
  .statusbar { bottom: 52px; font-size: 10px; padding: 3px 10px; }

  /* Encoder row wraps on small screens */
  .encoder-row { flex-wrap: wrap; }
  .encoder-btn { min-width: 80px; }

  /* Layer tabs scroll horizontally */
  .layer-tabs { flex-wrap: nowrap; overflow-x: auto; padding-bottom: 4px; }

  /* Grid: make keys a bit taller for touch */
  .key-btn { min-height: 52px; height: auto; padding: 10px 8px; }
}

/* Desktop: hide mobile nav */
@media (min-width: 769px) {
  .mobile-nav { display: none; }
}
</style>
</head>
<body>

<div class="header frame">
  <div>
    <div class="logo">MPLR EDITOR <span>&gt; macro pad layout editor</span></div>
  </div>
  <div class="stats">
    <div class="stat"><div class="slabel">PRESET</div><div class="svalue" id="stat-preset">—</div></div>
    <div class="stat"><div class="slabel">LAYERS</div><div class="svalue" id="stat-layers">0</div></div>
    <div class="stat"><div class="slabel">KEYS</div><div class="svalue" id="stat-keys">0</div></div>
  </div>
</div>

<div class="main">

  <!-- ── LEFT PANEL ── -->
  <div class="panel frame" id="left-panel">
    <div class="panel-collapse-rail" id="left-collapse-btn" onclick="toggleLeftPanel()" title="Collapse panel">
      <span class="collapse-arrow">◀</span>
    </div>

    <div class="panel-collapsed-rail">
      <button class="rail-icon-btn" onclick="newFile()" title="New preset">＋</button>
      <button class="rail-icon-btn" onclick="document.getElementById('file-input').click()" title="Open .mplr file">⇧</button>
      <button class="rail-icon-btn primary" onclick="saveFile()" title="Download .mplr file">⇩</button>
      <div style="height:1px;width:18px;background:var(--line);margin:4px 0"></div>
      <button class="rail-icon-btn" id="undo-btn-rail" onclick="undo()" title="Undo (Ctrl+Z)" disabled>↶</button>
      <button class="rail-icon-btn" id="redo-btn-rail" onclick="redo()" title="Redo (Ctrl+Y)" disabled>↷</button>
      <div class="rail-label">CONFIG</div>
    </div>

    <div class="panel-content">
    <div class="toolbar-group">
      <div class="toolbar-row">
        <button class="tbtn" onclick="newFile()" title="New preset">
          <span class="tbtn-icon">＋</span><span class="tbtn-label">NEW</span>
        </button>
        <label for="file-input" class="tbtn" title="Open .mplr file">
          <span class="tbtn-icon">⇧</span><span class="tbtn-label">OPEN</span>
          <input type="file" id="file-input" accept=".mplr,.txt" style="display:none" onchange="handleFileOpen(event)">
        </label>
        <button class="tbtn primary" onclick="saveFile()" title="Download .mplr file">
          <span class="tbtn-icon">⇩</span><span class="tbtn-label">DOWNLOAD</span>
        </button>
      </div>
      <div class="toolbar-row toolbar-row-split">
        <button class="tbtn" id="undo-btn" onclick="undo()" title="Undo (Ctrl+Z)" disabled>
          <span class="tbtn-icon">↶</span><span class="tbtn-label">UNDO</span>
        </button>
        <button class="tbtn" id="redo-btn" onclick="redo()" title="Redo (Ctrl+Y)" disabled>
          <span class="tbtn-icon">↷</span><span class="tbtn-label">REDO</span>
        </button>
      </div>
    </div>

    <div class="section" id="sec-project">
      <div class="section-header" onclick="toggleSection('sec-project')">
        PROJECT <i class="toggle-icon">▲</i>
      </div>
      <div class="section-body">
        <div class="flabel">Preset name</div>
        <input id="preset-name" value="Photoshop" oninput="onPresetNameChange()">
        <div class="flabel">Rows</div>
        <input id="cfg-rows" type="number" min="1" max="10" value="4" oninput="onGridChange()">
        <div class="flabel">Columns</div>
        <input id="cfg-cols" type="number" min="1" max="10" value="5" oninput="onGridChange()">
        <div class="flabel">Encoders</div>
        <input id="cfg-encs" type="number" min="0" max="16" value="1" oninput="onGridChange()">
      </div>
    </div>

    <div class="section" id="sec-layers">
      <div class="section-header" onclick="toggleSection('sec-layers')">
        LAYERS <i class="toggle-icon">▲</i>
      </div>
      <div class="section-body">
        <div id="layer-list"></div>
        <button style="width:100%;margin-top:4px" onclick="addLayer()">+ Add layer</button>
      </div>
    </div>
    </div>
  </div>

  <!-- ── CENTER PANEL ── -->
  <div class="panel frame" id="center-panel">
    <div class="layer-topbar">
      <div class="layer-tabs" id="layer-tabs"></div>
      <div id="layer-name-editor" style="display:none" class="layer-name-edit-wrap">
        <input id="layer-name-input" class="layer-name-input" placeholder="Layer name…" />
        <button onclick="commitLayerName()" class="layer-name-ok">✓</button>
      </div>
    </div>
    <div class="grid-wrap">
      <div class="matrix" id="key-matrix"></div>
    </div>
    <div class="encoder-section" id="encoder-section"></div>
  </div>

  <!-- ── RIGHT PANEL ── -->
  <div class="panel frame" id="right-panel">
    <div class="section" id="sec-action">
      <div class="section-header" onclick="toggleSection('sec-action')">
        ACTION EDITOR <i class="toggle-icon">▲</i>
      </div>
      <div class="section-body">
        <div id="no-selection" style="color:var(--muted);font-size:12px;padding:8px 0">
          ← Select a key or encoder to edit
        </div>
        <div id="action-form" style="display:none">
          <div class="flabel">Name</div>
          <input id="act-name" placeholder="Action name" oninput="onActionChange()">

          <div class="flabel">Input method</div>
          <select id="act-method" onchange="onActionChange()">
            <option value="p">PRESS / RELEASE</option>
            <option value="s">SEND</option>
            <option value="m">Mouse</option>
            <option value="c">Consumer Control</option>
            <option value="i">On-board / Function</option>
            <option value="d">Ducky</option>
          </select>

          <div class="flabel">Modifiers</div>
          <div class="mod-toggle-row" id="mod-toggle-row">
            <button type="button" class="mod-toggle" data-mod="CONTROL" onclick="toggleModifier('CONTROL', this)">CTRL</button>
            <button type="button" class="mod-toggle" data-mod="SHIFT" onclick="toggleModifier('SHIFT', this)">SHIFT</button>
            <button type="button" class="mod-toggle" data-mod="ALT" onclick="toggleModifier('ALT', this)">ALT</button>
            <button type="button" class="mod-toggle" data-mod="GUI" onclick="toggleModifier('GUI', this)">GUI</button>
          </div>

          <div class="flabel">Key sequence</div>
          <div class="key-combo-list" id="key-combo-list"></div>
          <button class="add-key-btn" onclick="addKeyToCombo()">+ Add key</button>

          <button style="width:100%;margin-top:14px" class="primary" onclick="applyAction()">APPLY</button>
          <button style="width:100%;margin-top:6px" class="danger" onclick="clearAction()">CLEAR KEY</button>
        </div>
      </div>
    </div>

    <div class="section" id="sec-preview">
      <div class="section-header" onclick="toggleSection('sec-preview')">
        OUTPUT PREVIEW <i class="toggle-icon">▲</i>
      </div>
      <div class="section-body">
        <textarea id="preview-out" rows="18" readonly style="font-size:11px;resize:none;color:var(--muted)"></textarea>
      </div>
    </div>
  </div>

</div>

<div class="statusbar">
  <span class="status-msg" id="status-msg">Ready</span>
  <span>|</span>
  <span id="status-sel">No selection</span>
</div>

<script>
// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
const METHOD_LABELS = {
  p: 'PRESS',
  s: 'SEND',
  m: 'Mouse',
  c: 'Consumer',
  i: 'Function',
  d: 'Ducky'
};

let state = {
  presetName: 'Photoshop',
  rows: 4,
  cols: 5,
  encoders: 1,
  currentLayer: 0,
  selectedKey: null,   // { type: 'key'|'encoder', id: number|string }
  layers: []
};

// ═══════════════════════════════════════════
//  UNDO / REDO HISTORY
// ═══════════════════════════════════════════
const HISTORY_LIMIT = 30;
let undoStack = [];
let redoStack = [];
let suppressHistory = false; // true while restoring, to avoid re-pushing

function snapshotState() {
  // Deep clone everything except the transient selectedKey (kept for UX continuity)
  return JSON.parse(JSON.stringify({
    presetName: state.presetName,
    rows: state.rows,
    cols: state.cols,
    encoders: state.encoders,
    currentLayer: state.currentLayer,
    layers: state.layers
  }));
}

let hasUnsavedChanges = false;

function pushHistory() {
  if (suppressHistory) return;
  undoStack.push(snapshotState());
  if (undoStack.length > HISTORY_LIMIT) undoStack.shift();
  redoStack = []; // new action invalidates redo branch
  updateUndoRedoButtons();
  hasUnsavedChanges = true;
}

function restoreSnapshot(snap) {
  suppressHistory = true;
  hasUnsavedChanges = true;
  state.presetName = snap.presetName;
  state.rows = snap.rows;
  state.cols = snap.cols;
  state.encoders = snap.encoders;
  state.currentLayer = snap.currentLayer;
  state.layers = snap.layers;
  state.selectedKey = null;
  syncInputs();
  render();
  suppressHistory = false;
}

function undo() {
  if (undoStack.length === 0) { setStatus('Nothing to undo'); return; }
  redoStack.push(snapshotState());
  const snap = undoStack.pop();
  restoreSnapshot(snap);
  updateUndoRedoButtons();
  setStatus('Undo');
}

function redo() {
  if (redoStack.length === 0) { setStatus('Nothing to redo'); return; }
  undoStack.push(snapshotState());
  const snap = redoStack.pop();
  restoreSnapshot(snap);
  updateUndoRedoButtons();
  setStatus('Redo');
}

function updateUndoRedoButtons() {
  const undoBtn = document.getElementById('undo-btn');
  const redoBtn = document.getElementById('redo-btn');
  const undoBtnRail = document.getElementById('undo-btn-rail');
  const redoBtnRail = document.getElementById('redo-btn-rail');
  if (undoBtn) undoBtn.disabled = undoStack.length === 0;
  if (redoBtn) redoBtn.disabled = redoStack.length === 0;
  if (undoBtnRail) undoBtnRail.disabled = undoStack.length === 0;
  if (redoBtnRail) redoBtnRail.disabled = redoStack.length === 0;
}

// ═══════════════════════════════════════════
//  LEFT PANEL COLLAPSE (VS Code style)
// ═══════════════════════════════════════════
function toggleLeftPanel() {
  const main = document.querySelector('.main');
  const collapsed = main.classList.toggle('left-collapsed');
  const btn = document.getElementById('left-collapse-btn');
  btn.title = collapsed ? 'Expand panel' : 'Collapse panel';
}

function isTypingInField(e) {
  const tag = (e.target.tagName || '').toLowerCase();
  return tag === 'input' || tag === 'textarea' || tag === 'select' || e.target.isContentEditable;
}

let clipboardAction = null; // { source: 'key'|'encoder', action: [...] }

function copySelectedAction() {
  if (!state.selectedKey) return;
  const layer = state.layers[state.currentLayer];
  const action = state.selectedKey.type === 'key'
    ? layer.keys[state.selectedKey.id]
    : layer.encoders[state.selectedKey.id];
  if (!action) { setStatus('Nothing to copy — key is empty'); return; }
  clipboardAction = JSON.parse(JSON.stringify(action));
  setStatus(`Copied: ${action[0]}`);
}

function pasteIntoSelectedAction() {
  if (!state.selectedKey) return;
  if (!clipboardAction) { setStatus('Clipboard is empty'); return; }
  pushHistory();
  const layer = state.layers[state.currentLayer];
  const copy = JSON.parse(JSON.stringify(clipboardAction));
  if (state.selectedKey.type === 'key') layer.keys[state.selectedKey.id] = copy;
  else layer.encoders[state.selectedKey.id] = copy;
  render();
  setStatus(`Pasted: ${copy[0]}`);
}

document.addEventListener('keydown', (e) => {
  const meta = e.ctrlKey || e.metaKey;
  if (!meta) return;
  if (e.key.toLowerCase() === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
  else if ((e.key.toLowerCase() === 'z' && e.shiftKey) || e.key.toLowerCase() === 'y') {
    e.preventDefault(); redo();
  }
  else if (e.key.toLowerCase() === 'c' && !isTypingInField(e)) {
    e.preventDefault(); copySelectedAction();
  }
  else if (e.key.toLowerCase() === 'v' && !isTypingInField(e)) {
    e.preventDefault(); pasteIntoSelectedAction();
  }
});

// ═══════════════════════════════════════════
//  INIT WITH EXAMPLE DATA
// ═══════════════════════════════════════════
function makeEmptyLayer(name, totalKeys, encoderCount) {
  const keys = {};
  for (let i = 0; i < totalKeys; i++) keys[i] = null;
  const encoders = {};
  for (let e = 0; e < encoderCount; e++) {
    encoders[`EC${e}L`] = null;
    encoders[`EC${e}B`] = null;
    encoders[`EC${e}R`] = null;
  }
  return { name, keys, encoders };
}

function initDefault() {
  state.presetName = 'Photoshop';
  state.rows = 4; state.cols = 5; state.encoders = 1;
  const total = state.rows * state.cols - 1; // 19 keys

  const drawing = makeEmptyLayer('Drawing', total, 1);
  const drawData = {
    1: ["New Window","p","F1"], 2: ["Fit screen","p","CONTROL","ZERO"],
    3: ["100%","p","CONTROL","ONE"], 4: ["Flip Horz.","p","CONTROL","F"],
    5: ["Color Switch","p","X"], 6: ["Brush Menu","p","F5"],
    7: ["New Layer","p","CONTROL","SHIFT","ALT","N"], 8: ["Undo","p","CONTROL","Z"],
    9: ["Redo","p","CONTROL","SHIFT","Z"], 10: ["Shift","p","SHIFT"],
    11: ["Reset Colors","p","D"], 12: ["Clear mode","p","GRAVE_ACCENT"],
    13: ["Brush","p","B"], 14: ["Eraser","p","E"], 15: ["FN","i"],
    16: ["CTRL","p","CONTROL"], 17: ["Picker","p","ALT"],
    18: ["Hand","p","SPACE"], 19: ["Transform","p","CONTROL","T"]
  };
  const drawEnc = {
    "EC0L": ["Brush -","s","LEFT_BRACKET"],
    "EC0R": ["Brush +","s","RIGHT_BRACKET"],
    "EC0B": ["Undo","s","CONTROL","Z"]
  };
  for (const [k,v] of Object.entries(drawData)) drawing.keys[k] = v;
  for (const [k,v] of Object.entries(drawEnc)) drawing.encoders[k] = v;

  const nav = makeEmptyLayer('Navigation', total, 1);
  const navData = {
    1:["New Window","p","F1"], 2:["Fit screen","p","CONTROL","ZERO"],
    3:["100%","p","CONTROL","ONE"], 4:["Flip Horz.","p","CONTROL","F"],
    5:["New Window","p","F1"], 6:["Brush Menu","p","F5"],
    7:["Brush Menu","p","F5"], 8:["New Layer","p","CONTROL","SHIFT","ALT","N"],
    9:["Rotate","p","R"], 10:["Shift","p","SHIFT"],
    11:["Fit screen","p","CONTROL","ZERO"], 12:["100%","p","CONTROL","ONE"],
    13:["Flip Horz.","p","CONTROL","F"], 14:["All Visible","p","CONTROL","SHIFT","ALT","E"],
    15:["Rotate","p","R"], 16:["New Window","p","F1"],
    17:["Picker","p","ALT"], 18:["Hand","p","SPACE"], 19:["Hand","p","SPACE"]
  };
  const navEnc = {
    "EC0L":["Zoom Out","s","CONTROL","MINUS"],
    "EC0R":["Zoom In","s","CONTROL","KEYPAD_PLUS"],
    "EC0B":["Merge Down","s","CONTROL","E"]
  };
  for (const [k,v] of Object.entries(navData)) nav.keys[k] = v;
  for (const [k,v] of Object.entries(navEnc)) nav.encoders[k] = v;

  state.layers = [drawing, nav];
  state.currentLayer = 0;
  syncInputs();
  render();
}

// ═══════════════════════════════════════════
//  COLLAPSIBLE SECTIONS
// ═══════════════════════════════════════════
function toggleSection(id) {
  document.getElementById(id).classList.toggle('collapsed');
}

// ═══════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════
function render() {
  renderStats();
  renderLayerList();
  renderLayerTabs();
  renderGrid();
  renderEncoders();
  highlightDuplicates();
  updatePreview();
  if (state.selectedKey) renderActionForm();
}

function comboSignature(action) {
  // method + sorted keys, ignoring the name — same trigger combo
  if (!action || action.length < 2) return null;
  const method = action[1];
  const keys = action.slice(2).slice().sort().join('+');
  if (!keys) return null; // no keys = nothing to collide on
  return `${method}::${keys}`;
}

function highlightDuplicates() {
  const layer = state.layers[state.currentLayer];
  if (!layer) return;

  const sigMap = {}; // signature -> array of {kind, id}
  Object.keys(layer.keys).forEach(k => {
    const sig = comboSignature(layer.keys[k]);
    if (!sig) return;
    (sigMap[sig] = sigMap[sig] || []).push({ kind: 'key', id: k });
  });
  Object.keys(layer.encoders).forEach(ek => {
    const sig = comboSignature(layer.encoders[ek]);
    if (!sig) return;
    (sigMap[sig] = sigMap[sig] || []).push({ kind: 'encoder', id: ek });
  });

  const dupSet = new Set();
  Object.values(sigMap).forEach(list => {
    if (list.length > 1) list.forEach(item => dupSet.add(`${item.kind}:${item.id}`));
  });

  document.querySelectorAll('.key-btn').forEach(btn => {
    const id = btn.dataset.keyIdx;
    btn.classList.toggle('duplicate', dupSet.has(`key:${id}`));
  });
  document.querySelectorAll('.encoder-btn').forEach(btn => {
    const id = btn.dataset.encId;
    btn.classList.toggle('duplicate', dupSet.has(`encoder:${id}`));
  });

  if (dupSet.size > 0) {
    setStatus(`⚠ ${dupSet.size} key(s) share the same combo`);
  }
}

function renderStats() {
  document.getElementById('stat-preset').textContent = state.presetName || '—';
  document.getElementById('stat-layers').textContent = state.layers.length;
  document.getElementById('stat-keys').textContent = state.rows * state.cols;
}

function renderLayerList() {
  const el = document.getElementById('layer-list');
  el.innerHTML = '';
  state.layers.forEach((layer, idx) => {
    const row = document.createElement('div');
    row.className = 'layer-item';

    const btn = document.createElement('button');
    btn.textContent = layer.name || `Layer ${idx}`;
    btn.style.cssText = 'flex:1;text-align:left';
    if (idx === state.currentLayer) btn.classList.add('active');
    btn.onclick = () => { state.currentLayer = idx; state.selectedKey = null; render(); };

    const dup = document.createElement('button');
    dup.textContent = '⧉';
    dup.className = 'del-btn';
    dup.style.cssText = 'flex:0 0 auto;padding:8px 10px';
    dup.title = 'Duplicate layer';
    dup.onclick = (e) => { e.stopPropagation(); duplicateLayer(idx); };

    const del = document.createElement('button');
    del.textContent = '✕';
    del.className = 'del-btn danger';
    del.style.cssText = 'flex:0 0 auto;padding:8px 10px';
    del.title = 'Delete layer';
    del.onclick = (e) => { e.stopPropagation(); deleteLayer(idx); };

    row.appendChild(btn);
    row.appendChild(dup);
    row.appendChild(del);
    el.appendChild(row);
  });
}

function renderLayerTabs() {
  const el = document.getElementById('layer-tabs');
  el.innerHTML = '';
  state.layers.forEach((layer, idx) => {
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;gap:0;align-items:stretch';

    const btn = document.createElement('button');
    btn.className = 'tab' + (idx === state.currentLayer ? ' active' : '');
    btn.style.cssText = idx === state.currentLayer ? 'border-right:none' : '';
    btn.textContent = (layer.name || `Layer ${idx}`).toUpperCase();
    btn.onclick = () => { state.currentLayer = idx; state.selectedKey = null; render(); };

    wrap.appendChild(btn);

    if (idx === state.currentLayer) {
      const editBtn = document.createElement('button');
      editBtn.className = 'tab active';
      editBtn.textContent = '✎';
      editBtn.style.cssText = 'padding:8px 10px;border-left:1px solid var(--line);font-size:12px';
      editBtn.title = 'Rename layer';
      editBtn.onclick = () => openLayerNameEditor(idx);
      wrap.appendChild(editBtn);

      const dupBtn = document.createElement('button');
      dupBtn.className = 'tab active';
      dupBtn.textContent = '⧉';
      dupBtn.style.cssText = 'padding:8px 10px;border-left:1px solid var(--line);font-size:12px';
      dupBtn.title = 'Duplicate layer';
      dupBtn.onclick = () => duplicateLayer(idx);
      wrap.appendChild(dupBtn);
    }

    el.appendChild(wrap);
  });
  const add = document.createElement('button');
  add.className = 'tab';
  add.textContent = '+';
  add.onclick = addLayer;
  el.appendChild(add);
}

function openLayerNameEditor(idx) {
  const wrap = document.getElementById('layer-name-editor');
  const inp = document.getElementById('layer-name-input');
  inp.value = state.layers[idx].name || '';
  wrap.style.display = 'flex';
  inp.focus();
  inp.select();
  inp.dataset.layerIdx = idx;
  inp.onkeydown = (e) => {
    if (e.key === 'Enter') commitLayerName();
    if (e.key === 'Escape') wrap.style.display = 'none';
  };
}

function commitLayerName() {
  const inp = document.getElementById('layer-name-input');
  const idx = parseInt(inp.dataset.layerIdx);
  const val = inp.value.trim();
  if (val && !isNaN(idx)) {
    pushHistory();
    state.layers[idx].name = val;
    renderLayerList();
    renderLayerTabs();
    updatePreview();
  }
  document.getElementById('layer-name-editor').style.display = 'none';
}

let dragSrcIdx = null;

function formatShortcut(action) {
  if (!action) return '';
  const keys = action.slice(2);
  if (keys.length === 0) return METHOD_LABELS[action[1]] || action[1] || '';
  // Shorten common long key names for compact display
  const SHORT = {
    CONTROL: 'CTRL', SHIFT: 'SHIFT', ALT: 'ALT',
    GRAVE_ACCENT: '`', LEFT_BRACKET: '[', RIGHT_BRACKET: ']',
    ZERO: '0', ONE: '1', TWO: '2', THREE: '3', FOUR: '4',
    FIVE: '5', SIX: '6', SEVEN: '7', EIGHT: '8', NINE: '9',
    SPACE: 'SPACE', MINUS: '-', KEYPAD_PLUS: '+', EQUALS: '='
  };
  return keys.map(k => SHORT[k] || k).join('+');
}

function renderGrid() {
  const layer = state.layers[state.currentLayer];
  const matrix = document.getElementById('key-matrix');
  matrix.style.gridTemplateColumns = `repeat(${state.cols}, 1fr)`;
  matrix.innerHTML = '';
  if (!layer) return;

  const total = state.rows * state.cols;
  for (let i = 0; i < total; i++) {
    const action = layer.keys[i];
    const btn = document.createElement('button');
    btn.className = 'key-btn' + (!action ? ' empty-key' : '');
    if (state.selectedKey && state.selectedKey.type === 'key' && state.selectedKey.id === i)
      btn.classList.add('selected');

    const name = action ? action[0] : 'Empty';
    const shortcut = action ? formatShortcut(action) : '';
    btn.innerHTML = `<span class="key-name">${name}</span><div class="key-bottom-row"><span class="key-idx">#${i}</span><span class="key-method" title="${shortcut}">${shortcut}</span></div>`;
    btn.dataset.keyIdx = i;
    btn.draggable = true;

    btn.onclick = () => selectKey('key', i);

    // drag
    btn.addEventListener('dragstart', e => {
      dragSrcIdx = i;
      btn.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    btn.addEventListener('dragend', () => {
      dragSrcIdx = null;
      document.querySelectorAll('.key-btn').forEach(b => {
        b.classList.remove('dragging', 'drag-over');
      });
    });
    btn.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if (dragSrcIdx !== null && dragSrcIdx !== i)
        btn.classList.add('drag-over');
    });
    btn.addEventListener('dragleave', () => btn.classList.remove('drag-over'));
    btn.addEventListener('drop', e => {
      e.preventDefault();
      btn.classList.remove('drag-over');
      if (dragSrcIdx === null || dragSrcIdx === i) return;
      swapKeys(dragSrcIdx, i);
    });

    matrix.appendChild(btn);
  }
}

function swapKeys(a, b) {
  pushHistory();
  const layer = state.layers[state.currentLayer];
  const tmp = layer.keys[a];
  layer.keys[a] = layer.keys[b];
  layer.keys[b] = tmp;
  // update selection to follow the dragged key
  if (state.selectedKey && state.selectedKey.type === 'key') {
    if (state.selectedKey.id === a) state.selectedKey.id = b;
    else if (state.selectedKey.id === b) state.selectedKey.id = a;
  }
  renderGrid();
  updatePreview();
  setStatus(`Swapped key #${a} ↔ #${b}`);
}

let dragSrcEncId = null;

function renderEncoders() {
  const layer = state.layers[state.currentLayer];
  const sec = document.getElementById('encoder-section');
  sec.innerHTML = '';
  if (!layer || state.encoders === 0) return;

  for (let e = 0; e < state.encoders; e++) {
    const label = document.createElement('div');
    label.className = 'encoder-label';
    label.textContent = `ENCODER ${e}`;
    sec.appendChild(label);

    const row = document.createElement('div');
    row.className = 'encoder-row';

    ['L','B','R'].forEach(dir => {
      const id = `EC${e}${dir}`;
      const action = layer.encoders[id];
      const dirLabels = { L: '◀ LEFT', B: '● PRESS', R: '▶ RIGHT' };
      const btn = document.createElement('button');
      btn.className = 'encoder-btn' + (!action ? ' empty-key' : '');
      if (state.selectedKey && state.selectedKey.type === 'encoder' && state.selectedKey.id === id)
        btn.classList.add('selected');

      const name = action ? action[0] : 'Empty';
      const shortcut = action ? formatShortcut(action) : '';
      btn.innerHTML = `<span class="enc-label">${dirLabels[dir]}</span><span class="enc-name">${name}</span><span class="key-method" title="${shortcut}">${shortcut}</span>`;
      btn.dataset.encId = id;
      btn.draggable = true;
      btn.onclick = () => selectKey('encoder', id);

      // drag
      btn.addEventListener('dragstart', ev => {
        dragSrcEncId = id;
        btn.classList.add('dragging');
        ev.dataTransfer.effectAllowed = 'move';
      });
      btn.addEventListener('dragend', () => {
        dragSrcEncId = null;
        document.querySelectorAll('.encoder-btn').forEach(b => {
          b.classList.remove('dragging', 'drag-over');
        });
      });
      btn.addEventListener('dragover', ev => {
        ev.preventDefault();
        ev.dataTransfer.dropEffect = 'move';
        if (dragSrcEncId !== null && dragSrcEncId !== id)
          btn.classList.add('drag-over');
      });
      btn.addEventListener('dragleave', () => btn.classList.remove('drag-over'));
      btn.addEventListener('drop', ev => {
        ev.preventDefault();
        btn.classList.remove('drag-over');
        if (dragSrcEncId === null || dragSrcEncId === id) return;
        swapEncoders(dragSrcEncId, id);
      });

      row.appendChild(btn);
    });

    sec.appendChild(row);
  }
}

function swapEncoders(a, b) {
  pushHistory();
  const layer = state.layers[state.currentLayer];
  const tmp = layer.encoders[a];
  layer.encoders[a] = layer.encoders[b];
  layer.encoders[b] = tmp;
  if (state.selectedKey && state.selectedKey.type === 'encoder') {
    if (state.selectedKey.id === a) state.selectedKey.id = b;
    else if (state.selectedKey.id === b) state.selectedKey.id = a;
  }
  renderEncoders();
  updatePreview();
  setStatus(`Swapped ${a} ↔ ${b}`);
}

// ═══════════════════════════════════════════
//  SELECTION & ACTION EDITOR
// ═══════════════════════════════════════════
function selectKey(type, id) {
  state.selectedKey = { type, id };
  renderGrid();
  renderEncoders();
  renderActionForm();

  const layer = state.layers[state.currentLayer];
  const action = type === 'key' ? layer.keys[id] : layer.encoders[id];
  const label = type === 'key' ? `Key #${id}` : id;
  document.getElementById('status-sel').textContent = `${label} · Layer: ${layer.name}`;

  // Auto-collapse the config panel on desktop to give the grid more room while editing
  const main = document.querySelector('.main');
  if (!isMobile() && main && !main.classList.contains('left-collapsed')) {
    main.classList.add('left-collapsed');
    const btn = document.getElementById('left-collapse-btn');
    if (btn) btn.title = 'Expand panel';
  }
}

function renderActionForm() {
  document.getElementById('no-selection').style.display = 'none';
  document.getElementById('action-form').style.display = 'block';

  const layer = state.layers[state.currentLayer];
  if (!layer || !state.selectedKey) return;

  const action = state.selectedKey.type === 'key'
    ? layer.keys[state.selectedKey.id]
    : layer.encoders[state.selectedKey.id];

  document.getElementById('act-name').value = action ? action[0] : '';
  document.getElementById('act-method').value = action ? action[1] : 'p';

  const keys = action ? action.slice(2) : [];
  activeModifiers = new Set(keys.filter(k => MODIFIER_KEYS.includes(k)));
  const regularKeys = keys.filter(k => !MODIFIER_KEYS.includes(k));
  syncModifierToggles();
  renderKeyCombo(regularKeys);
}

const MODIFIER_KEYS = ['CONTROL', 'SHIFT', 'ALT', 'GUI'];
let activeModifiers = new Set();

function toggleModifier(mod, btn) {
  if (activeModifiers.has(mod)) {
    activeModifiers.delete(mod);
    btn.classList.remove('active');
  } else {
    activeModifiers.add(mod);
    btn.classList.add('active');
  }
}

function syncModifierToggles() {
  document.querySelectorAll('.mod-toggle').forEach(btn => {
    const mod = btn.dataset.mod;
    btn.classList.toggle('active', activeModifiers.has(mod));
  });
}

function renderKeyCombo(keys) {
  const list = document.getElementById('key-combo-list');
  list.innerHTML = '';
  keys.forEach((k, idx) => {
    const row = document.createElement('div');
    row.className = 'key-combo-item';
    const inp = document.createElement('input');
    inp.value = k;
    inp.placeholder = 'e.g. Z, F1, SPACE';
    inp.dataset.idx = idx;
    const del = document.createElement('button');
    del.textContent = '✕';
    del.onclick = () => {
      const current = getNonModifierKeys();
      current.splice(idx, 1);
      renderKeyCombo(current);
    };
    row.appendChild(inp); row.appendChild(del);
    list.appendChild(row);
  });
}

function getNonModifierKeys() {
  return [...document.querySelectorAll('#key-combo-list input')].map(i => i.value.trim().toUpperCase()).filter(Boolean);
}

function getComboKeys() {
  // Modifiers always come first, in a fixed order, followed by regular keys
  const mods = MODIFIER_KEYS.filter(m => activeModifiers.has(m));
  return [...mods, ...getNonModifierKeys()];
}

function addKeyToCombo() {
  const current = getNonModifierKeys();
  current.push('');
  renderKeyCombo(current);
}

function applyAction() {
  if (!state.selectedKey) return;
  const name = document.getElementById('act-name').value.trim();
  const method = document.getElementById('act-method').value;
  const keys = getComboKeys();

  if (!name) { setStatus('Action name is required'); return; }

  pushHistory();
  const action = [name, method, ...keys];
  const layer = state.layers[state.currentLayer];
  if (state.selectedKey.type === 'key') layer.keys[state.selectedKey.id] = action;
  else layer.encoders[state.selectedKey.id] = action;

  render();
  setStatus(`Applied: ${name}`);
  if (isMobile()) {
    const gridBtn = document.querySelectorAll('.mobile-nav button')[1];
    switchMobilePanel('center-panel', gridBtn);
  }
}

function clearAction() {
  if (!state.selectedKey) return;
  pushHistory();
  const layer = state.layers[state.currentLayer];
  if (state.selectedKey.type === 'key') layer.keys[state.selectedKey.id] = null;
  else layer.encoders[state.selectedKey.id] = null;
  render();
  setStatus('Key cleared');
}

function onActionChange() {} // live editing handled on APPLY

// ═══════════════════════════════════════════
//  LAYER MANAGEMENT
// ═══════════════════════════════════════════
function addLayer() {
  pushHistory();
  const name = `Layer ${state.layers.length}`;
  const total = state.rows * state.cols;
  state.layers.push(makeEmptyLayer(name, total, state.encoders));
  state.currentLayer = state.layers.length - 1;
  render();
  setStatus(`Added layer: ${name}`);
}

function duplicateLayer(idx) {
  pushHistory();
  const source = state.layers[idx];
  const copy = JSON.parse(JSON.stringify(source));
  copy.name = `${source.name} copy`;
  state.layers.splice(idx + 1, 0, copy);
  state.currentLayer = idx + 1;
  state.selectedKey = null;
  render();
  setStatus(`Duplicated layer: ${copy.name}`);
}

function deleteLayer(idx) {
  if (state.layers.length <= 1) { setStatus('Cannot delete last layer'); return; }
  pushHistory();
  state.layers.splice(idx, 1);
  if (state.currentLayer >= state.layers.length) state.currentLayer = state.layers.length - 1;
  state.selectedKey = null;
  render();
  setStatus('Layer deleted');
}

// ═══════════════════════════════════════════
//  GRID CONFIG CHANGES
// ═══════════════════════════════════════════
let gridChangeHistoryPushed = false;
function onGridChange() {
  if (!gridChangeHistoryPushed) {
    pushHistory();
    gridChangeHistoryPushed = true;
    clearTimeout(window._gridChangeResetTimer);
    window._gridChangeResetTimer = setTimeout(() => { gridChangeHistoryPushed = false; }, 800);
  }
  state.rows = parseInt(document.getElementById('cfg-rows').value) || 4;
  state.cols = parseInt(document.getElementById('cfg-cols').value) || 5;
  state.encoders = parseInt(document.getElementById('cfg-encs').value) || 0;
  const total = state.rows * state.cols;

  // Resize layers — NEVER delete existing data, just add missing slots.
  // Keys and encoders outside current visible range are kept in memory.
  state.layers.forEach(layer => {
    // Ensure all visible key slots exist (fill gaps, never remove)
    for (let i = 0; i < total; i++) {
      if (!(i in layer.keys)) layer.keys[i] = null;
    }
    // Ensure all visible encoder slots exist (keep any existing data)
    for (let e = 0; e < state.encoders; e++) {
      ['L','B','R'].forEach(dir => {
        const id = `EC${e}${dir}`;
        if (!(id in layer.encoders)) layer.encoders[id] = null;
      });
    }
  });

  state.selectedKey = null;
  render();
}

let presetNameHistoryPushed = false;
function onPresetNameChange() {
  if (!presetNameHistoryPushed) {
    pushHistory();
    presetNameHistoryPushed = true;
    clearTimeout(window._presetNameResetTimer);
    window._presetNameResetTimer = setTimeout(() => { presetNameHistoryPushed = false; }, 800);
  }
  state.presetName = document.getElementById('preset-name').value;
  renderStats();
  updatePreview();
}

function syncInputs() {
  document.getElementById('preset-name').value = state.presetName;
  document.getElementById('cfg-rows').value = state.rows;
  document.getElementById('cfg-cols').value = state.cols;
  document.getElementById('cfg-encs').value = state.encoders;
}

// ═══════════════════════════════════════════
//  FILE SERIALISATION
// ═══════════════════════════════════════════
function serializeMplr() {
  const lines = [];
  lines.push('{');

  const presetName = state.presetName || 'Preset';
  lines.push(`"${presetName}": {`);

  state.layers.forEach((layer, li) => {
    lines.push(`    "Layer${li}": {`);
    lines.push(`        "Layout": "${layer.name || `Layer${li}`}",`);

    const keyNums = Object.keys(layer.keys).map(Number).sort((a,b)=>a-b);
    keyNums.forEach(k => {
      const action = layer.keys[k];
      if (!action) return;
      const parts = action.map(p => `"${p}"`).join(', ');
      const kStr = String(k).padStart(12);
      lines.push(`        ${kStr}: [${parts}],`);
    });

    const encKeys = Object.keys(layer.encoders);
    const filledEncKeys = encKeys.filter(ek => layer.encoders[ek]);
    filledEncKeys.forEach((ek, idx) => {
      const action = layer.encoders[ek];
      const parts = action.map(p => `"${p}"`).join(', ');
      const comma = idx < filledEncKeys.length - 1 ? ',' : '';
      lines.push(`        "${ek}": [${parts}]${comma}`);
    });

    lines.push(`        }${li < state.layers.length - 1 ? ',' : ''}`);
  });

  lines.push('    }');
  lines.push('}');
  return lines.join('\n');
}

function updatePreview() {
  document.getElementById('preview-out').value = serializeMplr();
}

// ═══════════════════════════════════════════
//  OPEN / SAVE
// ═══════════════════════════════════════════
function newFile() {
  if (hasUnsavedChanges && !confirm('You have unsaved changes. Create a new preset anyway? This cannot be undone.')) return;
  undoStack = [];
  redoStack = [];
  updateUndoRedoButtons();
  state.presetName = 'New Preset';
  state.rows = 4;
  state.cols = 5;
  state.encoders = 1;
  const total = state.rows * state.cols;
  state.layers = [makeEmptyLayer('Layer 0', total, 1)];
  state.currentLayer = 0;
  state.selectedKey = null;
  syncInputs();
  render();
  hasUnsavedChanges = false;
  setStatus('New preset created');
}

function saveFile() {
  const content = serializeMplr();
  const name = (state.presetName || 'preset').replace(/[^a-zA-Z0-9_-]/g, '_').toLowerCase();
  const blob = new Blob([content], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${name}.mplr`;
  a.click();
  URL.revokeObjectURL(a.href);
  hasUnsavedChanges = false;
  setStatus(`Saved: ${name}.mplr`);
}

function openFile() {
  document.getElementById('file-input').click();
}

function handleFileOpen(event) {
  const file = event.target.files[0];
  if (!file) return;
  loadMplrFile(file);
  event.target.value = '';
}

function loadMplrFile(file) {
  if (hasUnsavedChanges && !confirm('You have unsaved changes. Open a new file anyway? This cannot be undone.')) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      parseMplr(e.target.result);
      hasUnsavedChanges = false;
      setStatus(`Loaded: ${file.name}`);
    } catch(err) {
      setStatus(`Parse error: ${err.message}`);
    }
  };
  reader.readAsText(file);
}

// ═══════════════════════════════════════════
//  DRAG & DROP FILE INTO WINDOW
// ═══════════════════════════════════════════
let dragEnterCount = 0;

function isFileDrag(e) {
  return e.dataTransfer && e.dataTransfer.types && Array.from(e.dataTransfer.types).includes('Files');
}

window.addEventListener('dragenter', (e) => {
  if (!isFileDrag(e)) return;
  e.preventDefault();
  dragEnterCount++;
  const overlay = document.getElementById('drop-overlay');
  if (overlay) overlay.classList.add('active');
});

window.addEventListener('dragover', (e) => {
  if (!isFileDrag(e)) return;
  e.preventDefault(); // required to allow drop
});

window.addEventListener('dragleave', (e) => {
  if (!isFileDrag(e)) return;
  dragEnterCount--;
  if (dragEnterCount <= 0) {
    dragEnterCount = 0;
    const overlay = document.getElementById('drop-overlay');
    if (overlay) overlay.classList.remove('active');
  }
});

window.addEventListener('drop', (e) => {
  if (!isFileDrag(e)) return;
  e.preventDefault();
  dragEnterCount = 0;
  const overlay = document.getElementById('drop-overlay');
  if (overlay) overlay.classList.remove('active');

  const file = e.dataTransfer.files && e.dataTransfer.files[0];
  if (!file) return;

  const validExt = /\.(mplr|txt)$/i.test(file.name);
  if (!validExt) {
    setStatus(`Unsupported file: ${file.name}`);
    return;
  }
  loadMplrFile(file);
});

function parseMplr(text) {
  undoStack = [];
  redoStack = [];
  updateUndoRedoButtons();
  // Strip comments (lines starting with #) and docstring
  let clean = text.replace(/^#.*$/gm, '');
  // Remove the docstring block
  clean = clean.replace(/"""[\s\S]*?"""/m, '');
  // Remove Python-style trailing comments
  clean = clean.replace(/#[^\n]*/g, '');
  // Convert single-quoted strings to double-quoted
  clean = clean.replace(/'/g, '"');
  // Remove trailing commas before closing braces/brackets
  clean = clean.replace(/,\s*([\]}])/g, '$1');
  // Replace unquoted integer keys with quoted ones for JSON compatibility
  // e.g. "     1: " -> "\"1\": "
  clean = clean.replace(/^\s*(\d+)\s*:/gm, (m, k) => m.replace(k, `"${k}"`));

  let parsed;
  try {
    parsed = JSON.parse(clean);
  } catch(e) {
    throw new Error('Could not parse file (invalid format). ' + e.message);
  }

  const presetName = Object.keys(parsed)[0];
  const preset = parsed[presetName];

  state.presetName = presetName;
  state.layers = [];

  let maxKey = 0;
  let maxEnc = 0;

  Object.keys(preset).forEach(layerKey => {
    if (!layerKey.startsWith('Layer')) return;
    const src = preset[layerKey];
    const layer = { name: src['Layout'] || layerKey, keys: {}, encoders: {} };

    Object.keys(src).forEach(k => {
      if (k === 'Layout') return;
      if (/^\d+$/.test(k)) {
        const n = parseInt(k);
        layer.keys[n] = src[k];
        if (n > maxKey) maxKey = n;
      } else if (/^EC\d+[LBR]$/.test(k)) {
        layer.encoders[k] = src[k];
        const encNum = parseInt(k.replace('EC',''));
        if (encNum + 1 > maxEnc) maxEnc = encNum + 1;
      }
    });

    state.layers.push(layer);
  });

  // Estimate grid
  state.encoders = maxEnc;
  const total = maxKey;
  // Try to find rows/cols that fit
  const guessedCols = 5;
  const guessedRows = Math.ceil((total + maxEnc) / guessedCols);
  state.rows = guessedRows;
  state.cols = guessedCols;

  // Normalize keys: ensure all keys 1..total exist
  state.layers.forEach(layer => {
    for (let i = 0; i < total; i++) {
      if (!(i in layer.keys)) layer.keys[i] = null;
    }
    // Normalize encoders
    const encs = {};
    for (let e = 0; e < maxEnc; e++) {
      ['L','B','R'].forEach(dir => {
        const id = `EC${e}${dir}`;
        encs[id] = layer.encoders[id] || null;
      });
    }
    layer.encoders = encs;
  });

  state.currentLayer = 0;
  state.selectedKey = null;
  syncInputs();
  render();
}

// ═══════════════════════════════════════════
//  STATUS
// ═══════════════════════════════════════════
let statusTimer = null;
function setStatus(msg) {
  document.getElementById('status-msg').textContent = msg;
  clearTimeout(statusTimer);
  statusTimer = setTimeout(() => {
    document.getElementById('status-msg').textContent = 'Ready';
  }, 3000);
}

// ═══════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════
// ═══════════════════════════════════════════
//  WARN ON CLOSE / RELOAD WITH UNSAVED CHANGES
// ═══════════════════════════════════════════
window.addEventListener('beforeunload', (e) => {
  if (!hasUnsavedChanges) return;
  e.preventDefault();
  e.returnValue = ''; // required for the native browser dialog to appear
});

(function boot() {
  state.presetName = 'New Preset';
  state.rows = 4;
  state.cols = 5;
  state.encoders = 1;
  const total = state.rows * state.cols;
  state.layers = [makeEmptyLayer('Layer 0', total, 1)];
  state.currentLayer = 0;
  state.selectedKey = null;
  syncInputs();
  render();
  initMobileLayout();
  updateUndoRedoButtons();
})();

// ═══════════════════════════════════════════
//  MOBILE PANEL SWITCHING
// ═══════════════════════════════════════════
function isMobile() { return window.innerWidth <= 768; }

function switchMobilePanel(panelId, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('mobile-active'));
  document.getElementById(panelId).classList.add('mobile-active');
  document.querySelectorAll('.mobile-nav button').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
}

function initMobileLayout() {
  if (isMobile()) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('mobile-active'));
    document.getElementById('center-panel').classList.add('mobile-active');
    // mark GRID button active
    const navBtns = document.querySelectorAll('.mobile-nav button');
    navBtns.forEach(b => b.classList.remove('active'));
    if (navBtns[1]) navBtns[1].classList.add('active');
  }
}

window.addEventListener('resize', () => {
  if (!isMobile()) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('mobile-active'));
  } else {
    initMobileLayout();
  }
});

// Auto-switch to ACTION panel on mobile when key selected
const _selectKeyOrig = selectKey;
selectKey = function(type, id) {
  _selectKeyOrig(type, id);
  if (isMobile()) {
    const actionBtn = document.querySelectorAll('.mobile-nav button')[2];
    switchMobilePanel('right-panel', actionBtn);
  }
};

</script>

<div class="drop-overlay" id="drop-overlay">
  <div class="drop-overlay-inner">
    <div class="drop-icon">⇩</div>
    <div class="drop-text">Drop .mplr file to open</div>
  </div>
</div>

<div class="mobile-nav" id="mobile-nav">
  <button onclick="switchMobilePanel('left-panel', this)">⚙ CONFIG</button>
  <button onclick="switchMobilePanel('center-panel', this)" class="active">⌨ GRID</button>
  <button onclick="switchMobilePanel('right-panel', this)">✎ ACTION</button>
</div>
